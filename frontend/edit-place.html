<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Destination | Bihar Tourism</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .form-wrap{max-width:760px;margin:100px auto 80px;padding:0 24px;animation:fadeInUp 0.7s both;}
        .form-box{background:var(--white);border:1px solid var(--border);border-radius:24px;padding:52px;box-shadow:0 20px 60px rgba(0,0,0,0.06);}
        .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
        .fg{margin-bottom:20px;}
        .page-title{font-family:var(--serif);font-size:clamp(1.8rem,5vw,2.4rem);margin-bottom:8px;color:var(--dark);}
        .page-sub{color:var(--muted);margin-bottom:36px;font-size:0.88rem;}
        textarea.form-input{min-height:130px;resize:vertical;}
        .del-btn{background:rgba(211,47,47,0.06);color:#d32f2f;border:1px solid rgba(211,47,47,0.2);margin-top:16px;width:100%;padding:16px;border-radius:14px;cursor:pointer;transition:0.3s;font-weight:700;text-transform:uppercase;letter-spacing:1px;font-size:0.82rem;font-family:var(--sans);}
        .del-btn:hover{background:#d32f2f;color:#fff;transform:translateY(-2px);}
        nav.form-nav{position:fixed;top:0;left:0;right:0;z-index:1000;height:72px;display:flex;align-items:center;justify-content:space-between;padding:0 48px;background:rgba(250,247,242,0.92);backdrop-filter:blur(24px);border-bottom:1px solid rgba(0,0,0,0.08);}
        @media(max-width:768px){
            nav.form-nav{padding:0 20px;}
            .form-wrap{margin:88px auto 60px;padding:0 16px;}
            .form-box{padding:28px 20px;border-radius:18px;}
            .grid-2{grid-template-columns:1fr;gap:0;}
            .page-title{font-size:1.8rem;}
        }
        @media(max-width:480px){
            .form-box{padding:24px 16px;}
        }
    </style>
</head>
<body>
    <nav class="form-nav">
        <a href="index.html" style="text-decoration:none;font-family:var(--serif);font-size:1.45rem;color:var(--charcoal);">Bihar<span style="color:var(--terracotta);">.</span></a>
        <a href="index.html" style="color:var(--stone);text-decoration:none;font-size:0.72rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;display:flex;align-items:center;gap:5px;">← Home</a>
    </nav>
    <div class="form-wrap"><div class="form-box">
        <h1 class="page-title">Edit Destination</h1>
        <p class="page-sub">Update or remove this location.</p>
        <form id="standaloneEditForm">
            <input type="hidden" id="editPlaceId">
            <div class="grid-2">
                <div class="fg" style="margin-bottom:0"><label class="form-label">Place Name</label><input type="text" id="editPlaceName" required class="form-input"></div>
                <div class="fg" style="margin-bottom:0"><label class="form-label">Location</label><input type="text" id="editPlaceLocation" required class="form-input"></div>
            </div>
            <div class="grid-2">
                <div class="fg" style="margin-bottom:0"><label class="form-label">Category</label><select id="editPlaceCategory" required class="form-input"><option value="Heritage">Heritage</option><option value="Religious">Religious</option><option value="Nature">Nature</option><option value="Others">Others</option></select></div>
                <div class="fg" style="margin-bottom:0"><label class="form-label">Image URL</label><input type="text" id="editPlaceImage" class="form-input"></div>
            </div>
            <div class="fg"><label class="form-label">Google Maps Embed URL</label><input type="text" id="editPlaceMap" class="form-input" placeholder="Paste the iframe src URL from Google Maps share..."></div>
            <div class="fg"><label class="form-label">Description</label><textarea id="editPlaceDescription" required class="form-input"></textarea></div>
            <button type="submit" class="form-submit">Update Destination</button>
            <button type="button" class="del-btn" id="deleteBtnAction">Delete Permanently</button>
        </form>
    </div></div>
    <script src="edit-place.js"></script>
</body>
</html>
