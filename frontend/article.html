<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Information | Bihar Tourism</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #FAF7F2; --white: #FFFFFF; --charcoal: #1A1A1A; --dark: #0D0D0D;
            --terracotta: #C75B3A; --terracotta-light: #E07B5B; --terracotta-glow: rgba(199,91,58,0.12);
            --border: rgba(0,0,0,0.08); --radius-lg: 28px;
            --serif: 'DM Serif Display', Georgia, serif;
            --sans: 'Space Grotesk', system-ui, sans-serif;
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--cream); font-family: var(--sans); color: var(--charcoal); line-height: 1.8; }
        
        nav {
            position: fixed; top: 0; left: 0; right: 0; height: 72px;
            background: rgba(250,247,242,0.9); backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--border); z-index: 1000;
            display: flex; align-items: center; justify-content: space-between; padding: 0 48px;
        }
        .nav-logo { font-family: var(--serif); font-size: 1.45rem; color: var(--charcoal); text-decoration: none; }
        .nav-logo span { color: var(--terracotta); }
        .back-nav { color: #8A8279; text-decoration: none; font-size: 0.72rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }

        .hero-mini {
            margin-top: 72px; padding: 120px 24px 80px; text-align: center;
            border-bottom: 1px solid var(--border);
            background-size: cover; background-position: center; position: relative;
            background-color: var(--charcoal);
        }
        .hero-mini::before { content: ""; position: absolute; inset: 0; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.3), var(--cream)); z-index: 1; }
        .hero-mini * { position: relative; z-index: 2; }
        .article-title { font-family: var(--serif); font-size: clamp(2.5rem, 6vw, 4rem); color: #fff; text-shadow: 0 4px 20px rgba(0,0,0,0.3); line-height: 1.1; margin-bottom: 20px; }
        
        .content-container { max-width: 900px; margin: 60px auto 100px; padding: 0 24px; position: relative; }
        .article-body { font-size: 1.15rem; color: #4A443F; }
        .article-body h2 { font-family: var(--serif); margin: 40px 0 20px; color: var(--dark); font-size: 2rem; }
        .article-body p { margin-bottom: 24px; }
        
        /* ADMIN EDIT BAR */
        #adminEditBar {
            display: none; position: fixed; bottom: 24px; right: 24px; z-index: 1100;
            background: var(--charcoal); color: #fff; padding: 12px 24px; border-radius: 99px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2); align-items: center; gap: 16px;
        }
        .btn-edit { background: var(--terracotta); color: #fff; border: none; padding: 8px 20px; border-radius: 99px; font-weight: 700; cursor: pointer; font-family: var(--sans); font-size: 0.8rem; text-transform: uppercase; }

        /* EDITOR MODAL */
        #editorModal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px);
            z-index: 2000; display: none; align-items: center; justify-content: center; padding: 24px;
        }
        .modal-box { background: #fff; padding: 48px; border-radius: 28px; width: 100%; max-width: 800px; max-height: 90vh; overflow-y: auto; }
        .form-label { display: block; font-weight: 700; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: #968875; margin-bottom: 8px; }
        .form-input { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 24px; font-family: var(--sans); font-size: 1rem; }
        textarea.form-input { min-height: 300px; line-height: 1.6; }
        .btn-save { width: 100%; padding: 16px; background: var(--charcoal); color: #fff; border: none; border-radius: 12px; font-weight: 700; text-transform: uppercase; cursor: pointer; }
        
        @media (max-width: 768px) {
            nav { padding: 0 20px; }
            .hero-mini { padding: 60px 20px 40px; }
            .content-container { margin-top: 40px; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="nav-logo">Bihar<span>.</span></a>
        <a href="index.html" class="back-nav">← Back Home</a>
    </nav>

    <div id="loader" style="text-align:center; padding: 150px 20px; font-family: var(--serif); font-size: 1.5rem; color: #968875;">Loading information...</div>

    <div id="articleView" style="display:none;">
        <header class="hero-mini">
            <h1 class="article-title" id="displayTitle">Article Title</h1>
            <p id="lastUpdated" style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; color: #B5A898;">Last Updated: Jan 2026</p>
        </header>

        <main class="content-container">
            <div class="article-body" id="displayContent">
                <!-- Content injected here -->
            </div>
        </main>
    </div>

    <div id="adminEditBar">
        <span style="font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;">Admin Mode</span>
        <button class="btn-edit" onclick="openEditor()">Edit Page</button>
        <button class="btn-edit" onclick="deleteArticle()" style="background:#d32f2f; margin-left: 8px;">Delete</button>
    </div>

    <!-- Edit Modal -->
    <div id="editorModal">
        <div class="modal-box">
            <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom: 32px;">
                <h2 style="font-family: var(--serif); font-size: 2rem;">Edit Content</h2>
                <button onclick="closeEditor()" style="background:none; border:none; font-size: 2rem; cursor:pointer;">&times;</button>
            </div>
            <form id="articleForm">
                <label class="form-label">Page Title</label>
                <input type="text" id="editTitle" class="form-input" required>

                <label class="form-label">Hero Image URL</label>
                <input type="url" id="editImage" class="form-input" placeholder="https://images.unsplash.com/...">
                
                <label class="form-label">Page Content (HTML Allowed)</label>
                <textarea id="editContent" class="form-input" required></textarea>
                
                <button type="submit" class="btn-save" id="saveBtn">Save Changes</button>
            </form>
        </div>
    </div>

    <script src="article.js"></script>
</body>
</html>
